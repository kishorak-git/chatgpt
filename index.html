<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPay Plug</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#020617;color:#e2e8f0}

/* LOGIN FULL SCREEN */
.login-page{
  position:fixed;width:100%;height:100vh;
  display:flex;justify-content:center;align-items:center;
  background:#020617;z-index:999;
}
.login-box{
  width:320px;padding:30px;border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  text-align:center;
  box-shadow:0 0 40px rgba(34,197,94,0.2);
}
.login-box h2{color:#60a5fa;margin-bottom:20px}
.login-input{
  width:100%;padding:12px;margin:10px 0;
  border-radius:10px;border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:white;cursor:pointer;
}
.google-btn{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;cursor:pointer;
}

/* APP */
.topbar{width:100%;padding:15px;display:flex;align-items:center;gap:10px;background:#020617;border-bottom:1px solid rgba(59,130,246,0.2);}
.menu-btn{font-size:22px;cursor:pointer;color:white;}

.sidebar{position:fixed;left:-260px;top:0;height:100%;width:250px;background:rgba(10,10,20,0.95);border-right:1px solid rgba(59,130,246,0.2);padding:20px;transition:0.3s;z-index:1000;}
.sidebar.active{left:0}
.logo{font-size:22px;color:#60a5fa;margin-bottom:30px}
.nav-btn{width:100%;padding:12px;margin-bottom:10px;border:none;border-radius:10px;background:#020617;color:#94a3b8;cursor:pointer;}
.nav-btn:hover,.nav-btn.active{background:linear-gradient(135deg,#2563eb,#22c55e);color:white;}

.main{padding:20px}
.page{display:none}
.page.active{display:block}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{padding:20px;border-radius:15px;background:#020617;border:1px solid rgba(59,130,246,0.2);text-align:center;}
.pay-btn{padding:12px;width:100%;border:none;border-radius:10px;background:linear-gradient(135deg,#2563eb,#22c55e);color:white;cursor:pointer;}
.qr{width:140px;margin-top:10px;background:white;padding:6px;border-radius:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h2>⚡ SmartPay</h2>
    <input type="email" placeholder="Email" class="login-input" id="email">
    <input type="password" placeholder="Password" class="login-input" id="password">
    <button onclick="loginWithEmail()" class="login-btn">Login</button>
    <button onclick="loginWithGoogle()" class="google-btn">Google Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none;">

<div class="topbar">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  <h3>SmartPay</h3>
</div>

<div class="sidebar" id="sidebar">
  <div class="logo">⚡ SmartPay</div>
  <button class="nav-btn active" onclick="showPage('home',this)">Home</button>
  <button class="nav-btn" onclick="showPage('qr',this)">QR</button>
  <button class="nav-btn" onclick="showPage('payment',this)">Payment</button>
</div>

<div class="main">

<div id="home" class="page active">
  <h2>How to Use SmartPay</h2>
  <video width="100%" controls>
    <source src="tutorial.mp4" type="video/mp4">
  </video>
</div>

<div id="qr" class="page">
  <h2>Scan & Pay</h2><br>
  <div class="cards">
    <div class="card"><h3>₹10</h3>
      <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/9ixGnnK"></div>
    <div class="card"><h3>₹25</h3>
      <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/pqDtb3dH"></div>
    <div class="card"><h3>₹50</h3>
      <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/mKBH5wy"></div>
  </div>
</div>

<div id="payment" class="page">
  <h2>Pay Now</h2><br>
  <div class="cards">
    <div class="card"><h3>₹10</h3><button class="pay-btn" onclick="pay(10)">Pay</button></div>
    <div class="card"><h3>₹25</h3><button class="pay-btn" onclick="pay(25)">Pay</button></div>
    <div class="card"><h3>₹50</h3><button class="pay-btn" onclick="pay(50)">Pay</button></div>
  </div>
</div>

</div>
</div>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  toggleSidebar();
}

function pay(amount){
  if(amount==10) window.location.href="https://rzp.io/rzp/9ixGnnK";
  if(amount==25) window.location.href="https://rzp.io/rzp/pqDtb3dH";
  if(amount==50) window.location.href="https://rzp.io/rzp/mKBH5wy";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCn074Y2qun8KPMpmtzOZaUrJTe2CMAHP8",
  authDomain: "smartpayplug.firebaseapp.com",
  projectId: "smartpayplug",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginWithGoogle = async ()=>{
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

window.loginWithEmail = async ()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch{
    await createUserWithEmailAndPassword(auth,email,password);
  }
};

onAuthStateChanged(auth,(user)=>{
  const login=document.getElementById("loginPage");
  const appDiv=document.getElementById("app");

  if(user){
    login.style.display="none";
    appDiv.style.display="block";
  }else{
    login.style.display="flex";
    appDiv.style.display="none";
  }
});
</script>

</body>
</html>
